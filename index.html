<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#f0ece2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Hot Shit 🔥💩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Kalam:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="device" id="device" aria-live="polite">
    <header class="status">
      <span class="status-mode" id="mode">🔥💩 · BOOTING</span>
      <span class="status-leds">
        <span class="led led-on"></span>
        <span class="led led-ink"></span>
        <span class="led"></span>
      </span>
    </header>

    <section class="lcd" id="lcd">
      <div class="dotmatrix"></div>
      <div class="lcd-inner" id="screen"></div>
    </section>

    <nav class="hardware" id="hardware" aria-label="Hardware keys"></nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
